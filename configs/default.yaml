project_name: negflow

input:
  allow_fff: true
  allow_tiff: true

backend:
  mode: tiff_passthrough
  keep_intermediate_tiff: true
  external_converter_command: null

pipeline:
  detect_film_base: false
  auto_invert: false
  auto_white_balance: false
  auto_exposure: false
  auto_crop: false
  cleanup_dust: false
  cleanup_denoise: false
  output_sharpen: false

output:
  png_bit_depth: 16
  keep_preview_jpg: true
  keep_draft_frames: false
  keep_graded_frames: false
  save_sidecar_json: true
  color_profile: sRGB

preset:
  name: neutral_archive
